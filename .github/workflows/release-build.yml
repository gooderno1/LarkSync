name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_macos:
        description: "手动触发时是否构建并发布 macOS 安装包"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "25"

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/backend/requirements.txt
          python -m pip install "pytest>=7.4" "pytest-asyncio>=0.23"

      - name: Verify backend package metadata
        run: python -m pip install --dry-run -e apps/backend

      - name: Run backend tests
        working-directory: apps/backend
        run: |
          $env:PYTHONPATH = ""
          python -m pytest -q

      - name: Run Windows silent install smoke
        run: python scripts/update_install_smoke.py

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Lint frontend
        working-directory: apps/frontend
        run: npm run lint

      - name: Typecheck frontend
        working-directory: apps/frontend
        run: npm run typecheck

      - name: Run frontend tests
        working-directory: apps/frontend
        run: npm run test

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

  quality-macos-packaging:
    needs: quality
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    strategy:
      matrix:
        os: [macos-13, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/backend/requirements.txt
          python -m pip install "pytest>=7.4" "pytest-asyncio>=0.23"

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Run macOS-targeted backend tests
        working-directory: apps/backend
        run: |
          python -m pytest tests/test_build_installer.py tests/test_update_service.py tests/test_system_update_api.py tests/test_tray_update_install.py tests/test_backend_manager.py tests/test_tray_autostart.py tests/test_security.py tests/test_paths.py -q

      - name: Build macOS installer smoke
        env:
          LARKSYNC_MACOS_TARGET_ARCH: universal2
        run: python scripts/build_installer.py --dmg

  build-windows:
    needs: quality
    if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-dev') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install Python dependencies
        run: pip install -r apps/backend/requirements.txt

      - name: Verify version matches tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(python -c "from pathlib import Path;import re;content=Path('apps/backend/pyproject.toml').read_text(encoding='utf-8');m=re.search(r'^version\\s*=\\s*\\\"([^\\\"]+)\\\"', content, re.MULTILINE);print(m.group(1) if m else '')")"
          if [[ -z "$VERSION" ]]; then
            echo "未读取到版本号"
            exit 1
          fi
          if [[ "$VERSION" != "$TAG" ]]; then
            echo "版本号不一致：pyproject=$VERSION tag=$TAG"
            exit 1
          fi

      - name: Install NSIS
        run: choco install nsis -y

      - name: Add NSIS to PATH
        run: |
          echo "C:\\Program Files (x86)\\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build installer
        env:
          LARKSYNC_VERSION: ${{ github.ref_name }}
        run: python scripts/build_installer.py --nsis

      - name: Generate checksum assets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib

          for path in Path("dist").glob("LarkSync-Setup-*.exe"):
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              checksum_path = path.with_name(path.name + ".sha256")
              checksum_path.write_text(f"{digest}  {path.name}\n", encoding="utf-8")
              print(f"wrote {checksum_path}")
          PY

      - name: Generate release notes
        shell: bash
        run: |
          python scripts/release_notes.py --version "${GITHUB_REF_NAME}" --asset "dist/LarkSync-Setup-*.exe" --output release-notes.md

      - name: List dist
        run: |
          echo "dist contents:"
          dir dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/LarkSync-Setup-*.exe
            dist/LarkSync-Setup-*.exe.sha256
          if-no-files-found: error

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/LarkSync-Setup-*.exe
            dist/LarkSync-Setup-*.exe.sha256
          body_path: release-notes.md
          fail_on_unmatched_files: true

  build-macos:
    needs: quality
    if: ${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-dev') && (github.event_name != 'workflow_dispatch' || inputs.build_macos == true || inputs.build_macos == 'true') }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Verify version matches tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(python -c "from pathlib import Path;import re;content=Path('apps/backend/pyproject.toml').read_text(encoding='utf-8');m=re.search(r'^version\\s*=\\s*\\\"([^\\\"]+)\\\"', content, re.MULTILINE);print(m.group(1) if m else '')")"
          if [[ -z "$VERSION" ]]; then
            echo "未读取到版本号"
            exit 1
          fi
          if [[ "$VERSION" != "$TAG" ]]; then
            echo "版本号不一致：pyproject=$VERSION tag=$TAG"
            exit 1
          fi

      - name: Build DMG
        env:
          LARKSYNC_VERSION: ${{ github.ref_name }}
          LARKSYNC_MACOS_TARGET_ARCH: universal2
        run: python scripts/build_installer.py --dmg

      - name: Generate checksum assets
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib

          for path in Path("dist").glob("LarkSync-*.dmg"):
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              checksum_path = path.with_name(path.name + ".sha256")
              checksum_path.write_text(f"{digest}  {path.name}\n", encoding="utf-8")
              print(f"wrote {checksum_path}")
          PY

      - name: Generate release notes
        shell: bash
        run: |
          python scripts/release_notes.py --version "${GITHUB_REF_NAME}" --asset "dist/LarkSync-*.dmg" --output release-notes.md

      - name: List dist
        run: |
          echo "dist contents:"
          ls -la dist

      - name: Upload workflow artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: |
            dist/LarkSync-*.dmg
            dist/LarkSync-*.dmg.sha256
          if-no-files-found: error

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/LarkSync-*.dmg
            dist/LarkSync-*.dmg.sha256
          body_path: release-notes.md
          fail_on_unmatched_files: true
